# =============================================================================
# wrangler.toml — Cloudflare Worker Configuration
# =============================================================================
name = "etamail"
main = "dist/index.js"
compatibility_date = "2026-03-03"

# --------------------------------------------------------------------------
# KV Namespaces
# Bindings are configured via Cloudflare Dashboard (Settings -> Functions)
# to avoid hardcoding IDs in the repository.
# --------------------------------------------------------------------------
# [[kv_namespaces]]
# binding = "EMAILS_KV"
#
# [[kv_namespaces]]
# binding = "AUTH_KV"

# --------------------------------------------------------------------------
# Public Environment Variables (NO SECRETS HERE)
# --------------------------------------------------------------------------
[vars]
CHAIN_NAME      = "Polygon"
SESSION_TTL     = "86400"
NONCE_TTL       = "300"
ALLOWED_ORIGINS = "*"
#MAIL_FROM_ADDRESS     = ""
#MAIL_FROM_NAME        = "ETAMail"
#NOSTR_RELAY_HTTP      = "https://relay.damus.io"
#TELEGRAM_ALLOWED_CHAT = "YOUR_TELEGRAM_USER_ID"


# --------------------------------------------------------------------------
# SECRETS (Do NOT hardcode secrets in this file!)
# Set them via Cloudflare Dashboard (Settings -> Variables -> Secrets)
# or using: wrangler secret put <NAME>
# --------------------------------------------------------------------------

# Local development settings
[dev]
port = 8787
local_protocol = "http"

[[email]]
type = "worker"
